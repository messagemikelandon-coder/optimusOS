server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream backend:8000;

    root /usr/share/nginx/html;
    index index.html;

    location /static/ {
        alias /usr/share/nginx/html/;
        try_files $uri =404;
        # No explicit Cache-Control here means Cloudflare falls back to its own
        # default edge-cache TTL for static extensions (observed: 4 hours),
        # which serves stale JS/CSS/HTML for hours after every deploy. Forcing
        # revalidation (still cacheable, but always re-checked via ETag) makes
        # each deploy visible immediately without a manual CDN purge.
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /ready {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
