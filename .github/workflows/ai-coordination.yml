name: AI coordination checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  handoff-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate shared handoff
        run: python scripts/check_ai_handoff.py
