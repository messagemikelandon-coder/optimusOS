name: Application CI

# Real quality gates for source changes: lint, type-check, unit tests, JS
# syntax, migration integrity, and a Docker Compose boot + secret-log scan.
# This is separate from ai-coordination.yml, which only validates the AI
# session handoff doc and does not exercise any of the application itself.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, unit tests, JS syntax
    runs-on: ubuntu-latest
    services:
      # Backs the Redis-dependent rate-limit tests in tests/test_rate_limit.py
      # (skipped, not failed, when unreachable -- but real here, not mocked).
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR base ref for git diff --check
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: pyright
        run: uv run pyright

      - name: pytest
        run: uv run pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS syntax check
        run: node --check app/static/app.js

      - name: git diff --check (whitespace/conflict-marker hygiene on PR diff)
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

  migrations:
    name: Alembic migration integrity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: optimus_os
          POSTGRES_USER: optimus
          POSTGRES_PASSWORD: optimus_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U optimus -d optimus_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://optimus:optimus_local@localhost:5432/optimus_os
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Confirm a single linear migration head
        run: |
          heads="$(uv run alembic heads)"
          echo "$heads"
          test "$(printf '%s\n' "$heads" | grep -c .)" -eq 1

      - name: Upgrade from a clean database
        run: uv run alembic upgrade head

      - name: Confirm current revision is head
        run: uv run alembic current | grep -q "(head)"

      - name: Downgrade / upgrade round-trip
        run: |
          uv run alembic downgrade -1
          uv run alembic upgrade head
          uv run alembic current | grep -q "(head)"

      - name: shop_id orphan pre-flight check (/goal Phase 3 slice 6)
        run: uv run python scripts/check_shop_id_orphans.py

  docker-compose-integration:
    name: Docker build, compose config, boot, and secret-log scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies (for the log-scan script only)
        run: uv sync --extra dev

      # Placeholder values only, taken from .env.example -- never a real
      # secret. This file never leaves the runner and nothing below prints
      # its resolved contents (docker compose config always runs with -q).
      - name: Create placeholder env file for compose
        run: |
          cp .env.example .env
          # This job boots the stack with placeholder secrets to exercise
          # container/compose mechanics -- it is not a production deployment.
          # Declare a non-production APP_ENV so the fail-closed
          # production-config guard (app/startup_checks.py) correctly stays
          # silent instead of refusing to boot on .env.example's placeholder
          # secrets. .env.example itself keeps APP_ENV=production as the safe
          # template default real deployers copy.
          sed -i 's/^APP_ENV=production$/APP_ENV=ci/' .env

      - name: Validate docker-compose config (base)
        run: docker compose config -q

      - name: Validate docker-compose config (staging overlay)
        run: docker compose -f docker-compose.yml -f ops/docker-compose.staging.yml config -q

      - name: Build backend and worker images
        run: docker compose -p optimus_ci build backend worker

      - name: Boot the stack
        run: docker compose -p optimus_ci up -d postgres redis backend worker

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend did not become healthy in time" >&2
          docker compose -p optimus_ci logs backend
          exit 1

      - name: Apply migrations inside the running backend container
        run: docker compose -p optimus_ci exec -T backend alembic upgrade head

      - name: Confirm readiness
        run: curl -sf http://127.0.0.1:8000/ready

      - name: Scan service logs for secret-shaped values
        run: uv run python -m scripts.scan_logs_for_secrets --project optimus_ci --services backend worker postgres redis

      - name: Tear down
        if: always()
        run: docker compose -p optimus_ci down -v

      - name: Remove placeholder env file
        if: always()
        run: rm -f .env

  backup-restore-rollback-rehearsal:
    name: Backup, restore, and rollback rehearsal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies (for the log-scan script only)
        run: uv sync --extra dev

      # Placeholder values only, taken from .env.example -- never a real
      # secret. scripts/optimusctl.sh requires a real .env file to exist
      # (require_env) since it's the same script used against a real
      # deployment; here it only ever points at this job's own throwaway
      # Postgres container.
      - name: Create placeholder env file
        run: |
          cp .env.example .env
          # Placeholder-secret boot to exercise the deploy/rollback mechanics,
          # not a production deployment -- declare a non-production APP_ENV so
          # the fail-closed production-config guard (app/startup_checks.py)
          # stays silent instead of refusing to boot on placeholder secrets.
          sed -i 's/^APP_ENV=production$/APP_ENV=ci/' .env

      - name: Start the stack via optimusctl.sh (same script real deploys use)
        run: ./scripts/optimusctl.sh start

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend did not become healthy in time" >&2
          docker compose logs backend
          exit 1

      - name: Apply migrations
        run: ./scripts/optimusctl.sh migrate

      - name: Seed synthetic demo data (so backup/restore has real rows to compare)
        run: ./scripts/optimusctl.sh seed

      - name: Backup -- write a real pg_dump
        run: ./scripts/optimusctl.sh backup

      - name: Restore -- rehearse into a scratch database, never the live one
        run: |
          dump_file="$(ls -t backups/*.sql | head -1)"
          echo "Restoring $dump_file"
          ./scripts/optimusctl.sh restore "$dump_file" optimus_os_restore_check

      - name: Confirm restored row counts match the live database
        run: |
          # scripts/optimusctl.sh seed populates demo_service_requests, not
          # any real business table (customers etc. start empty until a real
          # owner session creates data) -- this must match what seed
          # actually writes, not an assumed table.
          live_count=$(docker compose exec -T postgres psql -U optimus -d optimus_os -tAc "SELECT count(*) FROM demo_service_requests")
          restored_count=$(docker compose exec -T postgres psql -U optimus -d optimus_os_restore_check -tAc "SELECT count(*) FROM demo_service_requests")
          echo "live=$live_count restored=$restored_count"
          test "$live_count" = "$restored_count"
          test "$live_count" -gt 0

      - name: Tag current backend/worker images as :previous (simulates a prior good release)
        run: |
          # Derived from the actual Compose project via `docker compose
          # config --images` (returns "<project>-backend"/"<project>-worker"
          # for services with no explicit `image:` field) -- never hardcode
          # an assumed prefix like "optimus-server", since the real value
          # depends on the checkout directory name and will not match that
          # in CI. Same lookup scripts/optimusctl.sh's own tag_current_as_previous
          # uses, kept in sync deliberately.
          backend_image="$(docker compose config --images | grep -m1 -- '-backend$')"
          worker_image="$(docker compose config --images | grep -m1 -- '-worker$')"
          echo "backend_image=$backend_image worker_image=$worker_image"
          docker tag "${backend_image}:latest" "${backend_image}:previous"
          docker tag "${worker_image}:latest" "${worker_image}:previous"

      - name: Deliberately break the running backend (simulates a bad deploy)
        run: |
          backend_image="$(docker compose config --images | grep -m1 -- '-backend$')"
          docker tag postgres:16-alpine "${backend_image}:latest"
          docker compose up -d --no-build backend

      - name: Confirm the broken deploy actually fails health
        run: |
          sleep 3
          if curl -sf --max-time 3 http://127.0.0.1:8000/health >/dev/null; then
            echo "Backend unexpectedly still healthy after being deliberately broken" >&2
            exit 1
          fi
          echo "Confirmed broken deploy is unhealthy, as expected"

      - name: Rollback -- restore the :previous image tag and confirm recovery
        run: ./scripts/optimusctl.sh rollback

      - name: Confirm health recovered after rollback
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "backend healthy again after rollback"
              exit 0
            fi
            sleep 2
          done
          echo "backend did not recover after rollback" >&2
          docker compose logs backend
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

      - name: Remove placeholder env file and backup dump
        if: always()
        run: rm -f .env backups/*.sql

  e2e-core-workflow:
    name: Authenticated E2E (real browser, real Postgres, real sessions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      # tests/e2e's own conftest.py manages its Postgres container and the
      # live uvicorn process it drives -- same docker-run pattern as every
      # other job here, just started from Python instead of a workflow
      # step. Excluded from the "pytest" step above via norecursedirs.
      - name: Run authenticated E2E suite
        run: uv run pytest tests/e2e -v
